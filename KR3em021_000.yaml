body:
  text: 咽喉大綱夫咽喉左為咽屬胃右為喉屬肺乃一身之總要通百節之關隘呼吸出入所由從也經云一陰一陽結謂喉痹痹者閉也有風寒暑濕燥火陰虛實熱之症盡皆有毒或相搏相聚其症不一變幻不測經云聖神功巧望問聞切以此推之治咽喉者庶無誤矣喉者氣之關隘通則利塞則閉無問其表本當急治之此風毒之氣客於咽喉與氣血相搏結腫成毒如熱入心包煩亂不食死矣咽舌兩經咽有兩孔左咽屬胃納食之關右喉屬肺納氣之關口上齶屬胃下齶屬脾胃分屬陽脾分屬陰舌心之中到舌尖屬心經舌之四圍皆屬脾經舌根亦屬心經小舌名曰蒂丁屬胃喉之左右屬肝經兩耳垂下者亦屬肝舌苔色白者屬寒淡白而紫者風寒也黃苔屬熱如焦黃者熱甚黑苔熱極也凡舌苔不論焦黃紅白黑色皆宜揩拭之滑有津者真熱凡治咽喉不可純用寒涼取效目前恐上熱未除中寒復起毒氣乘虛而入腹致胸前高腫上喘下泄不可救也看症凡例舌下兩竅最要留心左為華池金津右為神水玉液紫筋為舌系俱連於腎或用刀針傷刲兩竅津液耗散斷絶不連舌如干桔瓤矣無藥可救又小舌蒂丁傷之亦關性命醫者當知凡看症以箸按舌其色桃紅者起箸則紫紅此真色可治按其色云白起箸則紫紅色此血已死不治按其口中之舌色漸退起箸紫黑色徐現死期在邇不治凡治症先看氣血壯盛者可服涼藥衰弱者忌用寒涼用則氣衰即難治矣喉症初起寒戰即生疼痛發後身冷口內不碎身無別症二便如常不可以作火毒熱症此皆陰氣虛寒而發先以藥吹或以水喚之法灌喉即便服藥先以發散和解繼用溫補滋陰之味或二三日後再發寒熱或加心痛骨腰脅痛等症則為難治或喉症發時牙關緊閉喉舌俱腫口碎而臭或舌腫乳蛾喉風等症下午再發寒熱大小便閉者即作火毒熱症治用石膏敗毒主之喉症發時三日前胸膈不利脈弦而數治宜先祛風痰後解熱毒蓋飲酒則傷脾怒氣則傷肝色欲則傷腎濕鬱之人痰火上攻咽喉乾燥二便如常治宜補虛降火喉症初起口臭者有痰頭面紅腫此雖極危獨可愈也又初起火險痛處不腫而色如好人牙關不閉緊者不治發時面青帶白神氣少神喜浴坐底處不顧五行者不治舌腫滿者不治又色如胡桃者不治如荔枝色者不治初起不能言語者不治治症祕訣凡治症三日前症雖重尚未成膿藥能消散若至五六日成膿穿破後必腐爛難愈爛處多用八味口疳丹加龍骨珍珠散凡傷寒之後患連珠蛾及喉閉者不治蓋其頸頂硬強目睛上視故不治也凡喉症一二日即發寒熱者輕若初起不發寒熱者至第三日發寒熱者重大小便通利則易愈不過浮遊火上攻宜服消風清火解毒之劑若通二便則火易泄病易愈若大小便不通其症必重若內有寒而外有火用降火解毒重劑若頭痛恐傳變傷寒則難治矣凡症勢雖凶發於外者易治若初起大便閉結宜用大黃元明粉下之則自下降而愈若至六七日不愈仍閉結者用之立死蓋病久胃虛元氣大虧宜禁用硝黃等味矣雖大便閉甚只宜用蜜煎導法如牙皂細辛凡喉症無形便紅腫者宜用元丹凡婦人喉腫痛者有因經閉虛火上升而作痛者宜服通經藥凡喉症凶者面色白亮無光脈息沉微無力此係神氣外泄亡陽之徵不治若面色紅腫脈來洪大有力其勢雖凶而元氣尚存者治之可效若腫而不痛即系死肉症難治矣凡舌腫脹滿口塞住不能入藥用薑蠶牙皂二味炒研細末吹鼻中牙關開而痰涎出然後用箸卷絲棉蘸甘草湯潤其喉舌凡碎處腫處吹藥要細須要各處吹到不可忽略因能得藥力其勢即減矣凡治喉症最要細心即如喉花名曰蒂丁若用刀刺必須謹慎切勿可礙倘或傷之即有性命之憂至於走馬疳虛勞喉癬等症不一論附於後喉痹肝胃肺三經積熱所致復感時邪而驟發其形如海棠葉背紫紋其紋樣碎爛有小泡生於紋旁飲食如常治此症煎劑須用滋陰降火養肺之藥最利乎清火之品惟走馬喉痹之症其症至險尤宜早治用膏子藥不時含咽吹用真禁散珠黃散加參葉末吹嗆食啞喉此症不紅不腫因伏邪在肺聲啞嗆食六脈遲細甚屬險症飲食不進而死其脈若有根或可調治宜先表伏邪後用健脾峻補內外喉癰喉癰因過食厚味感熱而發生於喉關內外皆腫發熱頭痛四五日可愈吹用真禁珠黃散煎用清涼之品皯舌喉癰此乃心經火甚肥人性躁急者每患此症感熱而發舌之下生小舌為皯舌如連喉痛者為喉癰不痛者非癰也如皯舌並喉癰者凶吹用真禁藥煎用地黃湯舌菌屬心經因酒色憂鬱氣滯而生其狀如菌或木耳形其色紅紫時大時小吹真禁藥為主加珠黃散更妙附症七種屬心經舌根癰舌心癰側舌癰三尖皯舌紫脹吞木舌重舌吹用真禁藥珠黃散煎用犀角地黃湯舌症通治黑山梔粉丹皮赤芍藥生甘草鮮生地犀角尖小木通淨銀花荊芥穗連翹舌上癰即舌心癰生於舌之中心如梅子大不能言語此因熱入心包而發紅腫者可治色黑者不治又有舌黃舌上腫痛黃色亦屬心火舌下癰即舌根癰此乃脾腎兩經積熱發於舌下金津玉液二穴通於腎經腎水枯竭方生此穴治宜壯水扶脾紫舌此因心脾兩經熱乘所致有紅點紫色而爛痛或噁心欲嘔防發斑等症木舌因多食炙爆或由食滯中宮心脾肺三經積熱所致舌粗紫脹不能言語如兩寸關脈洪大症實易治六脈細者症虛難治重舌此乃心脾之熱所致舌下生小舌早不治大舌粗短小舌長而痛久必爛爛則難治牙疔先二日發熱後則牙痛不可忍牙根上發一紫泡是也生於上牙門者凶生於別牙旁者易治上左邊門牙脫落者不治因腎臟虛損挾心胃二火上攻初起未破為疔已破者為毒色紅者可治青色者不治吹真禁珠黃散牙癬由陽陰經實火上攻而發齒縫中出血上屬脾下屬胃牙根腐爛珍珠散生肌散珠黃散真禁藥馬牙初生小兒因胎中受毒見風而發含乳或吞或吐吹真禁服涼藥牙症乃是陽明胃經之症病生牙上陽明大腸之症病生牙下要知皆從腎家虛熱而生蓋齒乃骨之精腎之標也然不獨因腎而發亦有風邪所致用藥審症煎方宜酌玄參生地丹皮知母白芍地骨皮車前子生甘草黃柏連珠蛾滿口如白網油象肚兩邊微腫根有白點帶紅色小舌紅腫進湯大痛病由憂鬱熱毒而發其脈兩寸尺浮洪而大上盛下虛之症勢極重者也石蛾此因本源不足亦有胎生在乳蛾地位稍進半寸初忌寒涼蓋肝火憂鬱所致老痰惡血阻遏婦人最多鎖喉風因熱毒積聚痰涎黏稠阻塞會厭喘急上氣外頸腫脹用開關豁痰可治外不腫內無痰者名曰內鎖喉不治白纏喉風此乃腎虛受寒勞碌而渴寒則生熱熱則生風風寒相搏痰氣上躋壅滯凝結故患此症必眼白耳赤而紫口不能言關內腫上白下紅最為急症牙根白者不治牽絲纏喉風此症喉內有紫紅色血絲其症須防傳染喉菌憂鬱過度心胃兩經邪火入絡氣血滯而不散婦人患者最多狀如菌色紫生於兩旁用黃連解毒湯喉瘤本源不足怒氣傷肝或仰高叫或誦讀太急所以氣血相凝生於關內兩旁有小紫塊不時而發治宜培養本源喉癬因腎虛火炎肺經火旺不腫而微紅如海棠葉背紅筋狀有斑點青白又一或如芥菜子大或如緑豆大每點生芒刺飲食阻礙喉干音啞咳嗽無痰其斑點生於筋中者癬生於筋旁者痹用膏子藥不時含咽吹真禁珠黃散內加乳石中白參葉末煎用清肺養陰喉癰因過食厚味脾胃受熱感寒而發其色淡紅腫而痛甚者是也如李大亦發熱頭痛成膿易治吹真禁珠黃散上齶癰生於上齶如梅核大飲食妨礙又因胃家積熱化毒而發用解毒清涼吹同前此症由蘊熱積毒而生或因水虧致動相火或酒毒上攻內熱外寒火乘於肺致咽喉腫脹其形根大頭小紅色大痛下垂於關口上部吹口喉風此屬太陰病太陰腫脹疼痛舌向上是心血少而火易動肺氣虛而水不生蓋言語乃喉舌所司心有熱則現象於外是以水愈虧而火愈甚舌將強而難言也喉疔此不仁之症也初起形如杞子生於喉關口兩旁近舌處五臟積熱所致色淡紅而硬大痛難食背寒身熱如開花黑色者不治蓋因憤怒積思所致心血先絶死在旦夕女人得此立死上齶痛屬脾經上齶生瘡形如黃粟口中腥臭手足怕冷此由脾經積熱而生左右雀舌此因多食煎熬之物積熱於胃故發於舌旁或左或右近牙根生一小舌延久必爛爛則不能速愈喉疳此因腎虛火旺升騰而發喉間上齶有青白水點平塌無刺故名喉聲不啞不咳嗽兩尺脈虛者是也諸疳鎖口外嘴唇鎖喉咽喉吊根生舌中心下豆瓣生滿口堆沙舌心中梅花滿口碎糜口雪口白布滿口啄舌舌上皆用珠黃玉丹加真禁吹之以上疳症因驚風久虛痢疾久虛疳積久虛間有大人久病亦要發疳痘後有餘毒忌吹龍骨痧後忌咬牙恐其牙落也凡諸疳及口碎者俱用八味口疳丹吹之小兒走馬牙疳或因胎毒或因痘後毒未盡發於口齒或痧後發於牙根以致腐爛殺人最速色如干醬一日爛一分十日不治鼻梁上有紅點者不治上左邊門牙為牙中之主此牙一落余牙盡落不治若此牙不落別牙難落猶可強治然亦不過十中救二三也治此口疳藥內必用珠黃繭唇症屬足陽明胃經因久食厚味或思慮暴怒痰火上注於唇起初如黃豆大形如繭腫突起硬而堅甚作痛飲食妨礙或流血水久則變為消渴消中之症形體瘦弱虛熱痰生面色黧黑口乾渴甚者難治初起即治可愈治用艾灸三四次後用蟾酥餅貼內服八味丸方列於下大熟地四兩茯苓二兩山藥二兩澤瀉二兩萸肉一兩黃柏二兩知母五錢丹皮二兩蜜水為丸早晨清湯送下下午後服清涼甘露飲黑玄參一錢五分丹皮二錢麥冬二錢川貝二錢苦桔梗一錢杏仁三錢甘草一淺花粉二錢用藥祕訣凡治喉症於風癰痹蛾等實症宜先出其痰於虛者雖應出痰不可一時吊盡其痰吹藥宜用金碧二丹輕重配合適宜煎藥看症輕重以主方加減用之如寒症宜去涼藥虛症宜用滋陰臨症時必須細心酌奪不可草率主方喉兩旁屬肺頸項屬肝引經之藥酌用真川連黑山梔連翹淡芩海浮石牛蒡子薄荷前胡凡治喉癬嗆食音啞宜獨用碧金丹以膏子藥不時含咽再服煎劑大約滋陰降火補氣健脾為法其主藥然不可常服凡治牙症喉風牙癰菌毒上齶癰等症用八味口疳丹吹之若治牙宣宜珍珠散喉關起刺多因虛勞虛火上炎營陰虛虧將竭喉間紅點密如蚊蟲足迹者難治啞瘴風此因感觸時邪牙關不利開合風痰上壅不能言語若急欲開關必須探吐風痰俟痰涎將行吐盡然後吹藥再服煎劑可保無虞如面色與舌皆現青紫而唇見黑爪甲帶青鼻中流涕者不治乳蛾多因酒色鬱結而生初起一日病二日紅腫三日有形四日勢定其症生於關口兩旁小舌左右輕者五六日可愈如有寒熱交作者其症重險然生此又有分別單蛾因傷寒之後發散未盡身熱噁心恐見痧症雙蛾因感時邪而發如櫻桃大發寒熱六脈弦數肺胃之症也凡看喉症如遇深夜之際須要細心審症再三照看詳明方可用藥不得粗心忽略誤人自誤如病人以舌疊起見症不明必用搦舌壓之斯可見喉中症象若見症能明吹藥煎藥分兩須要照方配合不得任意加減而病家亦不得因藥味重而生疑以致自誤戒之慎之各症形象主治歌喉症乳蛾形若何雙單更有連珠蛾初起先痛後腫脹細白星生三日過治用玉金丹少許仍施煎劑有增加左連犀角右紫芍雙蛾並用妙堪歌喉癰似蛾無白星多吃醇醪厚味生腫痛無形由肺火玉丹主治略加金再含膏子服煎藥熱退痰消體自寧更有懸癰生上齶簪挑疳藥自安平喉癬緣由虛火生絲紅卻似海棠紋紋上斑點飲食痛調治滋陰匝月程煎劑須加大貝母玉丹膏子要並行若還好色多違戒肺壞難醫定啞聲喉菌因夫憂鬱生略高而厚象浮萍患此應吹何等藥金一分兮玉五分繼用玉三金且和煎方膏子不宜停若能守戒勤調治片月功成或可平舌下重生小舌愁其名皯舌細推求倘然痛後連喉腫皯舌並癰更可愁急以金丹吹舌下喉中略和玉金投地黃犀角連湯服病症雖凶知易瘳心中躁急纏喉風氣促心煩咽不通喉內紅絲纏絆緊頸如絞轉癢麻叢聲如曳鋸爪甲白項時厥冷足手同主治金玉牛黃含須要煎劑與同功此症若過一日夜目睛直視汗流凶移燈近口陡然滅聲若雷鳴數告終項癰色紅腫胸前外症外形欲內攻甚則咽喉多閉塞玉丹煎劑奏奇功外敷宜用三黃散喉腫還愁內出膿更有面癰相仿症托腮癰熱治宜同火鬱心經發舌癰舌尖地角腫而紅黃連犀角倍煎劑金玉均吹定有功喉刺患生勞瘵後齶生紅點密為凶傷寒氣塞名喉閉二症兼併術告窮木舌生來如熱何舌不能轉寒熱增更防一種白棗狀青紫紅纏舌下生初起不腫寒熱少發時難愈無方好幸有金丹成妙用病人痊告自安康舌菌生來似舌樣或如木耳屬心經斯為漫痛紅紫色金玉勻吹久自平一樣名為紫舌脹內多煩悶費調停竹刀刮垢丹吹玉犀角煎方要減增舌黃腫痛色亦黃煎劑仍施金玉方小兒口舌生白屑是名雪口細推詳絲棉箸扎蘸溫水常繳頻吹疳藥良犀角二丸能解毒但愁黑色命終亡連珠口疳舌下生小泡連連逐漸增使用小刀挑破後口疳藥治患非輕又如舌下崩砂症熱極牙根腫赤形總用口疳吹藥後須防落牙爛牙齦凶症名為走馬疳牙根白泡易容穿水流到處都成患腐爛須叟治已難牙縫出血是牙宣上屬脾兮下屬胃腐爛血濺由二火扶脾清胃劑為先止血因施珍珠散長肉生肌爛自愈此症痰多病最重速宜調治勿延遲牙槽風起牙先疼紫黑牙根肉腫焮久則爛開並帶臭更防牙漏血膿淋逢茲二症皆難愈珠倍牛黃各要增內服滋陰降火劑門牙上下落非輕牙根小塊是牙癰內外隨生無定蹤開合不應突硬核早醫可治血和融牙咬癰生盡齦中牙關咬緊夜尤凶先吹金玉牙齦上黃熱開關金奏功牙皯由虛無定處其形倣佛象牙癰金丹吹後吹疳藥冰片應加倍用通穿牙漏症惡應知牙痛先於二日時寒熱牙根生紫塊金丹略和玉吹靈再投涼血消疔劑破白穿牙毒症明須下牛黃疳藥內更吹兒茶珠如神喉疳腎火上飛騰青白紅斑喉齶生不嗽音清無刺塌不換頻吹定有靈煎用桔梗荷甘梔地丹知母及元參女貞鱉甲炙龜板數帖方能症患輕啞痹風痰塞斷喉牙關緊閉言語休開關探吐風痰藥荊防敗毒有功求面如改色眼流淚扁鵲廬醫見亦愁異症蓮花舌下生腫中伏火爍腎經快服滋陰益金散僅月之功可獲寧薄麥桔丹歸連術芍粉陳耆骨相喬苓與五味共十品煎吞併服自安平喉症總論歌喉症生於方寸間死生呼吸最危巔其症雜繁難枚舉總歸熱火相連煎一陰一陽為喉痹火為痰本寒相連更須詳辨分虛實二火相搏過食愆熱毒積久發喉痹胸膈不利脈洪弦口渴喉閉風痰壅治法將痰去為先後用清涼消熱毒斯無偏勝症斯痊虛火緣皆酒色過火痰上壅口如煙二脈如常作細弱治宜降火滋陰先忌用寒涼徒取效中寒後起症難痊上喘下泄胸高腫指甲青黑死何言凡治症者先發汗針砭出血非萬全辨症總訣喉症屬痰屬風火乳蛾等症總因之去風消痰解熱毒更開鬱結愈堪期若然初發寒戰起發後身涼即便安口無重舌唇不裂切勿誤將熱藥施蓋緣陰氣虛寒發其身津液化痰兮慎勿將痰多去盡恐竭精神必致危先以吹藥通喉脹散風和解莫煎遲次服溫補滋陰劑虛寒治法只如斯三日後再發寒戰心寒脅痛命如絲發時口碎閉失緊重舌便難熱症知治用石膏敗毒散症雖險凶易痊除惟有牙關不緊閉嚴如無急反稀奇舌腫胡桃如茄子服如卻熱總非宜以箸按舌見白色起箸見紫死無疑喘咳痰稠頸俱赤口臭色黑命難全口舌腐爛如無血更有無痰總莫宜看症治法歌喉症三日未成膿內藥消散易收功五日之後形症定口疳之藥可吹嚨再加龍骨珍珠末自然全愈得輕鬆傷寒之後喉生痹及患連珠蛾者凶喉症便閉有實火解實降火將便通大凡初起大便閉生軍芒硝有奇功倘若延之八九日大便雖閉胃虛空如用硝黃宜斟酌或用蜜導妙無窮喉碎先吹生肌散後吹金玉二丹從初起碧多金丹少次第加減莫朦朧勢凶但用金丹藥追出頑疾法最良紅腫連胸肺癰症百草霜加蜜化熔喉中無形僅紅腫加入元丹余藥同婦人經閉生喉症藥服通經法可宗面起浮腫脈沉細無陽之症死期逢口碎腫爛棉蘸水拭之不痛命當終舌脹滿口難吹藥殭蠶牙皂吹鼻中牙關自開痰涎出甘草湯潤舌色紅口疳藥內加冰片頻吹可免殞其窮症凶玉丹初起用冰多草少記於胸辨證用藥歌乳蛾雙單連珠粉多因酒色鬱熱生一日疼痛二日腫三日有形如細星生喉左右辨經絡左屬肺兮右屬心單蛾一邊白點起雙蛾兩邊有白星連珠白星上下有單輕雙重連珠屯四五日間用吹藥多用玉丹少用金吊出痰涎服煎劑左則黃連犀角湯右加柴胡赤芍藥大便閉加元明粉紅腫三朝無白點知是喉癰易得平喉癰無形僅痛腫寒熱頭痛肺火盛過食厚味煎爆物致成此疾易除根喉癬皆由虛火旺喉有絲紅認須明飲食阻礙微疼痛久而不治啞喉嚨喉菌憂鬱氣滯發狀如高厚壯浮萍生在喉旁色帶紫患者多半屬婦人兜腮癰症生腮下厚味多吞熱毒興小兒蛾口亦熱毒舌上生苔蛾口形舌黃總屬心經火舌上浮痛黃色新連珠蛾是憂鬱起滿口如脂虛症尋崩砂口疳多紅色舌下牙疳腫脹疼口內作臭牙根爛亦能落齒最堪驚喉刺上齶多紅點狀如蚊咬致亡身喉閉若發傷寒後十死無生少藥吞凡此諸般口舌症辨症用藥要留心輕吹四味口疳散重則金丹碧玉擒或用十寶金黃散內吹外敷建奇功雄黃解毒丸最效起死回生元奧深喉舌牙根通劑用臨時加減看何經心存利濟宜通曉尤氏家傳祕法真喉症通劑歌桔梗前胡與葛根連翹山梔共黃芩甘草薄荷牛蒡子銀花解毒佐元參寒熱前胡更要加口痛石膏胃火清口渴麥冬並知母飽時須知枳殼增鬱金貝母並赤芍喉家煎劑可通行舌症通劑歌黃連犀角黃山梔連翹生地粉丹皮麥冬赤芍同甘草加減還要臨症施如兼唇舌知脾火煅熟石膏瀉脾增郁有痰火加川貝便結元明粉最宜引加燈心用井水舌加煎劑此方奇牙症通劑歌元參丹皮甘草梢地骨山梔共石膏生地白芍同黃柏知母車前利下焦連翹解毒添黃連地丁甘菊毒疔消虛加熟地並杞子牙症煎方法最高喉症煎方歌貝母玄參同射干牛蒡生地與薑蠶連翹甘草天花粉喉癬清涼世上傳喉科諸症煎劑歌清胃梔連治馬疳山梔翹桔薄荷積青陳花粉川連殼赤苓前胡自昔傳喉癬煎方知母翹丹皮花粉鼠黏饒貝豆地元參茜草廣紅桔梗奏功高喉癬喉痹膏子囑地元歸合二冬臨廣紅貝豆玉沙桔霜葉收汁見奇神喉蛾芩桔忍冬犀元參蒡翹連豆衣左倍連犀右柴芍雙蛾並用功效奇纏喉風服豆根湯荷梔地豆元參防以上二錢通射一三分通脫急煎嘗喉舌牙三症煎方歌喉症梔翹桔薄荷芩元蒡子草僵前銀花口渴加冬母鬱悶須加貝芍先頭痛石膏胸悶殼身如寒熱入柴胡倘然大便難通利枳殼元明不可倫舌症知連草地冬翹犀赤芍粉丹通痰鬱定當加貝母口唇須藉石膏功牙症元丹地草知地骨車前芍柏梔發熱石膏升炒黑虛加耆杞最相宜喉舌牙三症並牙疳煎方歌喉症梔蒡海石三翹桔連芩各一錢前胡三錢加入用配成九味入方煎舌症二錢犀角鎊翹梔連芍一錢裝錢五丹皮木通用八分荊芥四甘藏還有一兩鮮生地搗汁相沖漱服康君臣佐使前人定須知藥性配柔剛牙症丹皮要用三五錢生地配成煎錢半車前甘草四地骨山梔各二錢白芍元參加知柏十味前醫定下仙要知藥性平和峻對症調醫病自痊牙疳五錢紫地丁紅花耆貝各三錢赤芍葛根花粉草銀花蘇木一般勻四味並來一兩四另包六味二錢分配得十味神方定煎來服下定安寧玉丹配法歌玉丹礬各三分重百草霜該用半匙次下元丹釐許足再加甘草末三匙必要用時方配合加硼少許更稱奇玉丹方即玉丹配合法制明礬春夏用二分秋冬用三分百草霜即鍋底炭半茶匙先研細末然後下元丹二釐再研細下甘草末三茶匙薄荷末春夏三分秋冬二分再研細末入冰片半分再研細入瓶內勿走氣此丹過五日無效用矣必要用時配合俱要加硼砂少許有痰症要吊痰者加牙皂少許此丹解毒消痰祛風清熱喉科一切輕症獨用此丹可也再加制蒲黃亦可重症與金丹摻用方用奇功金丹配法歌金丹錢八制硝君配入蒲黃末四分蠶末十釐為佐藥牙皂一錢五分均此丹經歲仍堪用冰片吹時必要增獨用非宜因性峻出痰消腫是其能金丹方制硝一錢八分蒲黃末四分先研細次下殭蠶末一分牙皂一分冰片一分研勻入瓶中久貯不壞臨用加入牛黃少許更妙此丹能消腫出痰遇牙咬皯舌疔毒用此丹如咽喉等症初起不宜多用因此丹性峻也若遇重症與玉丹配合用之開關散歌喉間塞絶命難存雄黃蠶皂各三分麝冰皆一膽礬五斬開關竅是其能開關散牙皂末滑石薑蠶末各一分明礬五分麝香一分雄黃三分冰片一分如喉症牙關緊閉以此藥吹鼻或水調灌喉即吐惡痰真禁藥配法歌禁藥為君只一錢蒲黃珠末二分仙滑硝各四川連五膽雄硼乳石三兼牛黃用一冰二半此藥醫喉妙難言真禁藥方真禁一錢滑石四分朴硝四分川連五分月石三分膽星三分熊膽三分乳石二分珍珠三分冰片二分五釐生蒲黃二分加牛黃更妙各藥消腫毒除風熱開喉出痰最妙專治牙癰皯舌重舌牙症等症八味口疳藥歌薄荷兒茶各二分只加黃柏一釐輕半分甘草珍珠末配將龍骨二釐勻釐半細堅香白芷若然腫痛倍加增且留冰片臨時下口疳勤吹妙若神八味口疳方薄荷二分兒茶二分龍骨二釐煅白芷二釐腫用四釐制黃柏一釐珍珠半分甘草半分研極細末勻和入瓶內臨時加冰片少許此丹專治各種口疳口碎及男婦咽喉腫痛雙單乳蛾牙咬皯舌喉癰等症立刻見效以水漱之吹口咽下不妨如初起腫而熱甚者多用薄荷冰片取其辛涼發散若患處不腫而不甚熱或久痛者依本方多加龍骨兒茶珠末配成紫色吹之如走馬疳穿牙疔毒重舌初生小兒胎毒口疳照本方加牛黃珠末如痘後口疳亦加牛黃倍珠末去黃柏龍骨須看症輕重而加減之大凡難愈之凶症及痘後牛黃珠末為要藥加之無不神應更入乳石硃砂少許加兒茶此係口疳之聖藥勿輕視之珠黃散配合歌黃一珠連末二分兒茶乳石五分均龍三雄四冰三半砂薄人中黃一錢珠黃散寶方治口疳口碎珍珠二分川連二分人中黃一錢薄荷一錢冬天少用兒茶五分雄黃四分硃砂一錢乳石五分人參葉八分牛黃一分龍骨三分冰片三分半口碎配合藥歌口碎兒茶赤石三朱硼膏各一錢研二分冰片臨時下口中碎爛霎時痊口碎方兒茶三錢赤石脂三錢硃砂一錢硼砂一錢石膏一錢煅冰片二分臨用如遇走馬疳加牛黃一分龍骨一錢珍珠二分元丹二分研吹立愈龍溪散配合歌龍溪散藥內何靈川連冰片二分臨銅緑一錢青黛五元丹要用必三分龍溪散治惡爛口疳症色黑者龍溪散川連二分冰片二分銅緑一錢青黛五分元丹三分吹喉散配合歌吹喉散內石脂三硝石膏硼各一錢冰片二分加入用吹到喉間效若仙吹喉散赤石脂三分冰片二分月石一錢槍硝一錢石膏一錢煅硼砂一錢如遇婦人喉中腫痛者加元丹五分附尤氏喉症祕方五福化毒丹如喉痹喉癬即將此丹噙化參葉二錢真禁二錢珠黃散一錢洋參八分冰片五分白桔梗五分川連五分青黛三分當門子二分飛金三十張蜜和為丸硃砂為衣行痰丸能行痰去風熱然必量人虛實服之川鬱金二錢栝蔞霜五分巴豆霜五分雄黃五分蜜丸雄黃解毒丸治啞痹風雄黃一兩巴豆十四粒去油鬱金二錢研末醋丸如緑豆大熱茶送下七丸去痰便蘇如不吐痰者再服七丸如人已死心上溫者研末灌之又方巴豆三十粒去油鬱金一兩緑豆一兩雄黃一兩犀角解毒丸治蛾口並小兒諸丹毒痧痘餘毒犀角二錢桔梗一兩赤苓一錢甘草一錢朴硝二錢生地五錢牛蒡子五錢連翹六錢元參六錢青黛二錢研細糊丸如桂圓大服一丸有驚者以硃砂為衣犀角丸治蛾口犀角三錢羚羊角三錢川連二錢麵糊為丸如桐子大每日三服白湯送下雄黃真珠解毒丸治唪舌唪舌者舌腫而高也雄黃二兩珠粉二分乳香五分沒藥五分血竭一錢輕粉一分大梅片一分兒茶一錢杭粉一錢化毒丸犀角二錢乳香二錢沒藥二錢炙甘草三錢制黃柏三錢糊丸牛黃清心丸治痧後疳症陳膽星一兩麝香五分珍珠五分冰片五分川雅連二錢荊芥二錢天竺黃二錢犀角一錢文蛤一錢防風一錢玄參一錢白桔梗一錢雲茯苓一錢當歸一錢輕粉三分共為細末和甘草青黛為丸如龍眼大辰砂為衣薄荷湯送下潤喉膏鹿角霜石膏九制薄荷研末蜜浸潤喉走馬疳方熊膽一錢青黛一錢川連一錢蘆薈一錢甜瓜蒂一錢煅甘中黃五分煅丁香五分珍珠五分牛黃五分冰片五分安息香五分炙蟬衣五分元寸五分蜣螂五分酒炙夜明砂五分淘以甘草膏化熊膽為丸辰砂為衣如桐子大乳研化用新筆蘸塗患處外用桃柳枝煎湯洗鼻尖喉風吹藥制火硝蒲黃硼砂薄荷冰片共為末喉蛾吹藥白明礬一兩用巴豆三錢八分熬枯去豆白芷三釐甘草少許冰片五釐百草霜五釐蒲黃五釐貝母五釐薄荷一分制硝二分又方百藥煎三錢月石七分甘草七分薄荷一錢四分枯礬三錢鹿角霜一錢八分大梅片五釐牙皂一錢八分蒲黃一錢八分瓜蒂一錢九分常山五分煅燈心八錢勾鈔硝一兩煅真青藥制礬三分青黛二分百草霜五釐甘草一分薄荷二分元丹一釐月石一分五釐冰片一分真禁藥蒲黃一分冰片一分薄荷一分制硝六分月石三分膏子藥薄荷四錢制礬二分元丹三釐貝母二分甘草五釐百草霜五釐冰片五釐先將百草霜與礬研入元丹再研諸藥研勻後入冰片以蜜調之遇喉痹喉癬喉菌須時時噙化若症重者宜兼服煎劑玉鎖匙治風熱喉閉纏喉風制火硝一兩五錢制殭蠶一錢冰片二分雄黃三錢通竅散炙牙皂十條元寸五釐研末吹鼻得嚏生肌散煅龍骨血竭沒藥乳香黃丹兒茶月石赤石脂煅石膏冰片上藥照雷公炮製等分吹摻一切口舌發毒吹藥薄荷一錢兒茶八分珍珠二分甘草一分牛黃一分硃砂三分西月石五分冰片一分研細末吹如治廣瘡結毒加輕粉少許尤氏方有天靈蓋三分滴乳石一分無西月石祕傳十寶丹喉症通用薄荷二兩兒茶一兩制梅礬一兩甘草五錢牛黃一錢冰片一錢血竭三錢琥珀三錢珠末三錢滴乳石四錢症輕去牛黃梅礬出痰甚捷吹藥內俱宜和用單用亦可此藥妙甚不可輕視冰黃散內吹外敷兼治丹毒煅甘中白一錢冰片一錢蒲黃一錢甘草五分青黛五分月石五分薄荷一錢五分川連一錢五分桔礬少許尤氏方無桔礬有朴硝三黃散治頸癰托腮面口喉舌內結毒大黃一錢薑黃一錢冰片五釐元寸五釐調敷患處加薑汁蔥汁各二三匙更妙或芭蕉扁柏汁皆可如喉腫不消因氣血凝滯或痰塊結而不散此陰症也非蔥薑汁不可玉液上清丸喉痹薄荷十四兩柿霜五兩桔梗四兩五錢甘草一兩一錢百藥煎五錢川芎二兩八錢砂仁五錢防風一兩五錢青黛三錢月石三錢元明粉三錢冰片二錢煉蜜為丸如桐子大每服一丸又治風熱喉腫痛口舌生瘡等症白靈丹制硝三錢二分明礬一兩月石三錢三分入銅勺內化研專治喉痹菌瘤牙宣舌菌松子風等症用時酌加禁藥珠黃散吹之沈慕溪喉症祕方炙雞內金挂金燈子蒲黃薄荷鹿角膠甘草白芷冰片先以甘草薄荷研細再將諸藥研和治牙咬重舌七日愈蛾三日愈喉科金藥硃砂三錢雄黃三錢黃柏三錢山豆根三錢甘草一錢枯礬三錢牛黃三分冰片三分雞內金三分炙痰多加牙皂五釐珍珠散治牙宣出血不止龍骨三錢烏賊骨二錢降香節一錢參三七一錢珍珠一錢炙象皮一錢乳香一錢沒藥一錢冰片二分共研細末以棉花蘸藥塞患處以紙抵之用一二次即止如有爛處用生肌散摻之生肌散方二治牙宣腐爛醋煅花蕊石二錢兒茶二錢雞內金二錢煅偉丹二錢飛冰片三分大紅絨灰一錢乳香一錢川連一錢吹藥方治牙宣牙癰牙腮等毒冰片三分麝香二分川連五分珍珠一錢月石一錢牛黃三分大紅絨灰一錢青黛一錢中白一錢元明粉一錢蜜炙黃柏一錢鹿角霜二錢雄黃五分文蛤五分如無珠粉絨灰加枯礬一錢粉草一錢銅緑五分雞內金二錢希涎散治弄舌喉風牙皂緑礬藜蘆紫雪青礬冰片麝香月石元明粉祛腐丹喉症代刀方治雪口糜口喉疳硼砂文蛤各等分加鴨嘴膽礬研末吹之治纏喉風一切急症方梅礬二兩生草三錢兒茶三錢雄黃二錢珍珠六分血珀六分殭蠶四分麝香少許開關散甘草四錢冰片一分牛黃六分先以甘草末入青魚膽收干臨用加冰片牛黃再用絡麻子末少許和勻但此非輕症所能用若遇喉症吹金碧二丹而無用無痰者非痰也急加此藥於金碧二丹內吹之急救喉症神效方大木鱉子一百粒淨水洗曬乾陳松羅茶五錢濃煎一大盞浸七日冬天浸十日瀝出曬乾以碗鋒刮去黑殼刮至白色以麻油六兩入廣勺內文武火煎滾以余粒為一次入滾油中熬至將沉然前取出候冷研末每藥一錢加冰片少許勿向上仰吹處宜在兩旁輕者一次即愈重者吹二三次有起死回生之妙吹口藥方川連川貝青黛冰片人中白青果將棗子去核入內包好煅紅去棗炭用果灰各等分吹之引經藥同瘍醫大全藥梅方喉症通用用大青梅銀針去蒂清水洗以槍硝明礬末拌一晝夜取起曬乾以後用池菊二兩滑石二兩荊芥一兩大貝母一兩木通一兩連翹一兩花粉一兩赤芍一兩牛蒡子一兩甜橘紅一兩雙鉤一兩黑梔一兩桔梗一兩前胡一兩赤茯苓一兩麥門冬二兩淡芩二兩黃柏二兩元參二兩生地三兩薄荷三兩銀花四兩羌活五錢白芷五錢防風五錢熬膏收入梅子內曬乾浸入滴滷內臨症用時取淡竹葉汁煎須服之如火沖入童便可也制硝法名真禁用槍硝半斤白蘿蔔汁四大碗做品字樣放盆內浮水面上過一夜至明晨拿起竹片凝結挂上味平性平者可用再以甘草湯煮提一次復用所開各藥煎濃去渣入硝在內提一次取起曬乾用青果汁收入硝內即名之曰真禁池菊二兩滑石二兩荊芥一兩大貝母一兩木通一兩連翹一兩花粉一兩赤芍一兩牛蒡子一兩甜橘紅一兩雙鉤一兩黑梔一兩桔梗一兩前胡一兩赤茯苓一兩麥門冬二兩淡芩二兩黃柏二兩元參二兩生地三兩薄荷三兩銀花四兩羌活五錢白芷五錢防風五錢將前藥煎湯提好硝硝陳久更佳制梅礬法名雪丹青梅切下蓋去核不可破碎即用白礬末塞滿仍以蓋蓋好竹絲簽好過一夜將梅子平排炭火中燒至梅成炭取起去灰聽用惟做時需竹絲簽好外再用泥裹之否則恐礬走出也制礬名奪命丹任其煎煮不可扇動用明礬二兩五錢打碎度次將槍硝打碎投下少時再將月石二十分之三打碎投下礬用十分硝用三分先以礬下次硝次月石如是逐漸投入待藥鋪起罐口如饅頭狀方加炭火燒至乾枯取淨瓦一塊蓋口稍時取起用牛黃少許為末再用水五六匙調和以箸挑起滴丹上將罐仍入火內煅干即起連罐覆地上以紙襯之於罐取丹如豆大人乳一杯共入銅勺內在炭火上燒至高突如饅頭樣以文武火燒至枯如紫霞色極松者佳黑者不可用凡遇口中難過之症配入八味口疳藥內吹之玉丹用明礬打碎入罐內用桴炭火煅以箸攪之無塊為度再用瓦覆之過七日貯之聽用松者佳堅實者不用因能殺人也然此礬可留作蜜調藥用玉丹宜多制愈陳愈佳此即玉丹配法內之制礬也走馬疳驗方野薔薇根搗汁漱之能止潰爛去腐肉生新肉用葉煎汁亦可絡麻子一味治一切喉症研末吹之無不藥到病除此味未知可是鄉間俗云之脧麻子否酉字散治腐爛疼痛雞內金不落水曬乾研末每錢加冰片一分兒茶二分能止痛收功
